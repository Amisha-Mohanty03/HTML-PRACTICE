<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <table border="1" style="width: 70%">
        <thead>
          <tr>
            <th colspan="4">Registration Form</th>
          </tr>
        </thead>

        <tr>
          <td>Student Name</td>
          <td>
            <input type="text" placeholder="first name " style="width: 170px" />
          </td>
          <td>
            <input
              type="text"
              placeholder="middle name "
              style="width: 170px"
            />
          </td>
          <td>
            <input type="text" placeholder="last name " style="width: 170px" />
          </td>
        </tr>
        <tr>
          <td>Father's Name</td>
          <td>
            <input
              type="text"
              placeholder="father's name "
              style="width: 170px"
            />
          </td>
          <td>Mother's Name</td>
          <td>
            <input
              type="text"
              placeholder="mother's name "
              style="width: 170px"
            />
          </td>
        </tr>
        <tr>
          <td>Date of Birth</td>
          <td><input type="date" name="dob" /></td>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender" value="male" /> Male
            <input type="radio" name="gender" value="female" /> Female
          </td>
        </tr>

        <tr>
          <td>Category</td>
          <td>
            <label
              ><input
                type="radio"
                name="category"
                value="General"
              />General</label
            >
            <label><input type="radio" name="category" value="OBC" />OBC</label>
            <label
              ><input type="radio" name="category" value="SC/ST" />SC/ST</label
            >
          </td>
          <td>Handicapped</td>
          <td>
            <input type="radio" name="handicapped" value="yes" /> Yes
            <input type="radio" name="handicapped" value="no" /> No
          </td>
        </tr>

        <tr>
          <td>Ex-Serviceman</td>
          <td>
            <input type="radio" name="exserviceman" value="yes" /> Yes
            <input type="radio" name="exserviceman" value="no" /> No
          </td>
          <td>EWS</td>
          <td>
            <input type="radio" name="ews" value="yes" /> Yes
            <input type="radio" name="ews" value="no" /> No
          </td>
        </tr>

        <tr>
          <td>Email ID</td>
          <td><input type="email" name="email" style="width: 170px" /></td>
          <td>Mobile No.</td>
          <td><input type="tel" name="MobileNo" style="width: 170px" /></td>
        </tr>
        <tr>
          <td>State</td>
          <td>
            <select name="state" id="state">
              <option selected>Select any One</option>
              <option value="Delhi">Delhi</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Kerala">Kerala</option>
            </select>
          </td>

          <td>City</td>
          <td>
            <select name="city" id="city">
              <option selected>Select any One</option>
              <option value="New Delhi">New Delhi</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Bangalore">Bangalore</option>
              <option value="Chennai">Chennai</option>
              <option value="Kerela">Kerala</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Upload Photo</td>
          <td><input type="file" name="photo" /></td>
          <td>Upload Signature</td>
          <td><input type="file" name="signature" /></td>
        </tr>
        <tr>
          <td></td>
          <td colspan="3" align="center">
            <input type="submit" name="submit" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
